services:
  - type: web
    name: my-django-backend
    runtime: python
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn core.wsgi:application
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "bioval-backend.onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: my-django-db
          property: connectionString
      - key: CORS_ALLOWED_ORIGINS
        value: "https://bioval-frontend.vercel.app/"
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_ID
        sync: false
      - key: FRONTEND_URL
        value: "https://bioval-frontend.vercel.app/"
      - key: CLERK_JWKS_URL
        sync: false

databases:
  - name: my-django-db
    plan: free